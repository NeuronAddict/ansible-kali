---
- name: Ensure user folder is created
  file:
    path: '/vagrant/shared_kali/{{ default_user }}'
    owner: '{{ default_user }}'
    state: directory

- name: link folder to home
  file:
    state: link
    src: '/vagrant/shared_kali/{{ default_user }}'
    dest: '/home/{{ default_user }}/shared'
